<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarbingerX Game Store | Premium Top-Up</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="theme-ww">
    <div class="bg-layer bg-ww"></div>
    <div class="bg-layer bg-wwm"></div>
    <div class="particles"></div>
    
    <header>
        <h1 class="logo">HARBINGER<span class="accent-text">X</span></h1>
        <p class="tagline">Next-Gen In-Game Purchases</p>
    </header>

    <main>
        <div class="game-switcher">
            <button class="game-btn active" data-game="ww">Wuthering Waves</button>
            <button class="game-btn" data-game="wwm">Where Winds Meet</button>
        </div>

        <section id="packages-container" class="grid-container"></section>
    </main>

    <div id="order-modal" class="modal hidden">
        <div class="modal-wrapper">
            <div class="modal-content glass-effect">
                <span class="close-btn">&times;</span>
                <div class="scroll-content">
                    <h2 id="modal-package-name" class="glow-text">Package Name</h2>
                    <p id="modal-game-name" class="game-tag">Game Name</p>
                    
                    <form id="order-form">
                        <div class="input-group">
                            <input type="text" id="email-username" required placeholder=" ">
                            <label>Email/Username</label>
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" required placeholder=" ">
                            <label>Password</label>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <input type="text" id="server" required placeholder=" ">
                                <label>Server</label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="ign" required placeholder=" ">
                                <label>In-game Name</label>
                            </div>
                        </div>
                        
                        <div class="price-calculator">
                            <label>Quantity:</label>
                            <div class="qty-control">
                                <button type="button" class="qty-btn" id="minus-btn">−</button>
                                <input type="number" id="quantity" value="1" min="1">
                                <button type="button" class="qty-btn" id="plus-btn">+</button>
                            </div>
                            <div class="total-price">
                                Total: <span id="display-price">0</span> BDT
                            </div>
                        </div>

                        <div class="payment-section">
                            <h3>Payment Instruction (bKash)</h3>
                            <div class="number-copy">
                                <span>Send Money to:</span>
                                <div class="copy-container">
                                    <strong id="bkash-number" class="highlight">01610359086</strong>
                                    <button type="button" class="copy-icon" onclick="copyNumber()" title="Copy Number">📋</button>
                                </div>
                            </div>
                            <p>Payable Amount: <strong id="payment-amount" class="highlight">0 BDT</strong></p>
                            <div class="input-group" style="margin-top: 15px;">
                                <input type="text" id="trxid" required placeholder=" ">
                                <label>bKash TrxID</label>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn" id="submit-btn">
                            <span class="btn-text">Confirm Order</span>
                            <span class="loader hidden"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="modal hidden">
        <div class="modal-wrapper">
            <div class="modal-content glass-effect text-center premium-popup">
                <div class="success-icon-container">
                    <div class="success-icon">✓</div>
                </div>
                <h2 class="glow-text">Registration Successful!</h2>
                <p>Your order has been successfully placed. Your items will be delivered within 24 hours.</p>
                <button id="close-success" class="submit-btn mt-20">Got it</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
